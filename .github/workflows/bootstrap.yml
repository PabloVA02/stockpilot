name: Clean bootstrap files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Remove temporary archive parts
        run: |
          rm -rf .bootstrap
          git config user.name "PabloVA02"
          git config user.email "PabloVA02@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove temporary publication files"
          git push
