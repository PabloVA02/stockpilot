name: Publish StockPilot

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Publish project files
        run: |
          cat .bootstrap/part-*.b64 | base64 -d > /tmp/source.tar.gz
          tar -xzf /tmp/source.tar.gz
          git config user.name "PabloVA02"
          git config user.email "PabloVA02@users.noreply.github.com"
          git add -A
          git commit -m "feat: publish production-ready StockPilot"
          git push
