name: Publish verified upgrade

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Apply verified project changes
        shell: bash
        env:
          SNAPSHOT_B64: ""
        run: |
          printf '%s' "$SNAPSHOT_B64" | base64 --decode > "$RUNNER_TEMP/verified.tar.xz"
          tar -xJf "$RUNNER_TEMP/verified.tar.xz"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to publish"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: publish verified production upgrade"
          git push
